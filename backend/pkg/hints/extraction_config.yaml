package: cozo
version: v1
families:
  - type: hint
    required: true
    description: Primary assistant guidance for the current question or diagnosis. The backend can inject anchor metadata from the originating request, so the model does not need to invent line numbers.
    fields:
      - text
      - code
      - chips
      - warning
      - anchor
    yaml_example: |
      text: Use an inline rule to bind the relation and return the selected variables.
      code: |
        ?[name, age] := *users{name, age}
      chips:
        - add a filter
        - sort the results
      warning: Keys go before => when you create a stored relation.
  - type: query_suggestion
    required: false
    description: Insertable CozoScript suggestion the UI can offer as a next action. Keep the payload focused on user-visible content instead of synthetic IDs.
    fields:
      - label
      - code
      - reason
      - anchor
    yaml_example: |
      label: Filter to age > 30
      code: |
        ?[name, age] := *users{name, age}, age > 30
      reason: Add a simple comparison in the rule body.
  - type: doc_ref
    required: false
    description: Supporting concept reference for a widget or expanded explanation. The backend may attach request-level anchor metadata when the source line is known.
    fields:
      - title
      - section
      - body
      - url
      - anchor
    yaml_example: |
      title: Inline rules
      section: §2.1
      body: The ?[vars] := body pattern defines an inline rule and returns the head variables.
